<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索模式 - 连线</title>
    <link rel="stylesheet" href="css/font-awesome/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <!-- <link rel="stylesheet" href="css/index.css"> -->
    <link rel="stylesheet" href="css/goLink.css">
    <!-- <link rel="stylesheet" href="css/exploreList.css"> -->
    <script src="js/common.js"></script>
</head>

<body>
    <!-- 公共导航 -->
    <div class="tab-nav">
        <div class="tab-item active" data-tab="question">
            <i class="fas fa-question-circle"></i> 问题图谱
        </div>
        <div class="tab-item" data-tab="ability">
            <i class="fas fa-brain"></i> 能力图谱
        </div>
    </div>

    <!-- 头部工具栏 -->
    <div class="w_head">
        <div class="w_head_txt">提示：请将主线与子级进行关联</div>
        <div class="w_head_btnwrap">
            <button class="golink-btn golink-btn-stop" id="golink-stop-btn">
                <i class="fas fa-stop"></i>
                终止探索
            </button>
            <button class="golink-btn golink-btn-submit" id="golink-submit-btn">
                <i class="fas fa-check"></i>
                提交
            </button>
        </div>
    </div>

    <!-- 主工作区 -->
    <div class="w_main golink-main" id="golink-workspace">

        <!-- SVG 画布 -->
        <svg id="golink-connections-svg" class="connections-svg">
            <defs>
                <linearGradient id="gradient-level-1-to-level-2" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#409eff" />
                    <stop offset="100%" stop-color="#67c23a" />
                </linearGradient>
                <linearGradient id="gradient-level-2-to-level-3" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#67c23a" />
                    <stop offset="100%" stop-color="#e6a23c" />
                </linearGradient>
                <linearGradient id="gradient-level-3-to-level-4" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#e6a23c" />
                    <stop offset="100%" stop-color="#f56c6c" />
                </linearGradient>
                <linearGradient id="gradient-level-4-to-level-5" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#f56c6c" />
                    <stop offset="100%" stop-color="#E372DB" />
                </linearGradient>
            </defs>
        </svg>

        <div class="w_cont golink-cont">
            <!-- 第一层级 -->
            <div class="w_cont_problem ABox golink-box" id="golink-level-1">
                <div class="w_contp_head">
                    <div class="w_contp_icon" style="background: #409eff;">
                        <i class="fas fa-question"></i>
                    </div>
                    <div class="w_contp_title_container">
                        <p class="w_contp_txt">第一层级</p>
                    </div>
                </div>
                <div class="w_contp_main" id="golink-level-1-cards">
                </div>
            </div>

            <!-- 第二层级 -->
            <div class="w_cont_problem BBox golink-box" id="golink-level-2">
                <div class="w_contp_head">
                    <div class="w_contp_icon" style="background: #67c23a;">
                        <i class="fas fa-book"></i>
                    </div>
                    <div class="w_contp_title_container">
                        <p class="w_contp_txt">第二层级</p>
                    </div>
                </div>
                <div class="w_contp_main" id="golink-level-2-cards">
                </div>
            </div>

            <!-- 第三层级 -->
            <div class="w_cont_problem CBox golink-box" id="golink-level-3">
                <div class="w_contp_head">
                    <div class="w_contp_icon" style="background: #e6a23c;">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <div class="w_contp_title_container">
                        <p class="w_contp_txt">第三层级</p>
                    </div>
                </div>
                <div class="w_contp_main" id="golink-level-3-cards">
                </div>
            </div>

            <!-- 第四层级 -->
            <div class="w_cont_problem DBox golink-box" id="golink-level-4">
                <div class="w_contp_head">
                    <div class="w_contp_icon" style="background: #f56c6c;">
                        <i class="fas fa-puzzle-piece"></i>
                    </div>
                    <div class="w_contp_title_container">
                        <p class="w_contp_txt">第四层级</p>
                    </div>
                </div>
                <div class="w_contp_main" id="golink-level-4-cards">
                </div>
            </div>

            <!-- 第五层级 -->
            <div class="w_cont_problem EBox golink-box" id="golink-level-5">
                <div class="w_contp_head">
                    <div class="w_contp_icon" style="background: #E372DB;">
                        <i class="fas fa-star"></i>
                    </div>
                    <div class="w_contp_title_container">
                        <p class="w_contp_txt">第五层级</p>
                    </div>
                </div>
                <div class="w_contp_main" id="golink-level-5-cards">
                </div>
            </div>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="golink-modal" id="golink-detail-modal">
        <div class="golink-modal-overlay" id="golink-modal-overlay"></div>
        <div class="golink-modal-content">
            <div class="golink-modal-header">
                <h3 id="golink-modal-title">详情</h3>
                <button class="golink-modal-close" id="golink-modal-close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="golink-modal-body">
                <div id="golink-modal-desc"></div>
            </div>
        </div>
    </div>

    <script src="js/goLink.js"></script>
</body>

</html>
