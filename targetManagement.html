<!DOCTYPE html>
<html lang="zh-CN">

<!--
  页面：内容管理页
  功能：管理图谱中的内容项（知识点/问题），支持新建、编辑、删除、标签管理、知识点关联、模板导入导出
  依赖：Font Awesome 图标库、common.css、targetManagement.css
-->

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理</title>
    <!-- ==================== 样式表 ==================== -->
    <link rel="stylesheet" href="css/font-awesome/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/targetManagement.css">
    <!-- ==================== 脚本库 ==================== -->
    <script src="js/common.js"></script>
</head>

<body>
    <div class="management-page">
        <!-- ==================== 顶部导航栏 ==================== -->
        <!-- 包含返回按钮、页面标题、模板导入和导出按钮 -->
        <div class="management-nav">
            <div class="nav-left">
                <button class="nav-btn back-btn" id="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    返回
                </button>
                <h2 class="nav-title">内容管理</h2>
            </div>
            <div class="nav-right">
                <button class="nav-btn outline-btn" id="template-import-btn">
                    <i class="fas fa-file-import"></i>
                    模板导入
                </button>
                <button class="nav-btn outline-btn" id="export-btn">
                    <i class="fas fa-file-export"></i>
                    一键导出
                </button>
            </div>
        </div>

        <!-- ==================== 筛选工具栏 ==================== -->
        <!-- 提供标签筛选、名称搜索和新建按钮 -->
        <div class="management-toolbar">
            <div class="toolbar-filters">
                <div class="filter-group">
                    <label class="filter-label">标签</label>
                    <div class="filter-selector" id="tag-filter">
                        <span class="filter-text">全部</span>
                        <i class="fas fa-chevron-down"></i>
                        <div class="filter-dropdown" id="tag-filter-dropdown"></div>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">名称</label>
                    <input type="text" class="filter-input" id="name-filter" placeholder="搜索名称">
                </div>
            </div>
            <button class="btn btn-primary" id="create-btn">
                <i class="fas fa-plus"></i>
                新建
            </button>
        </div>

        <!-- ==================== 内容表格 ==================== -->
        <!-- 展示所有内容项，支持全选、排序、编辑、删除等操作 -->
        <div class="management-table-wrap">
            <table class="management-table" id="content-table">
                <thead>
                    <tr>
                        <th class="th-check">
                            <input type="checkbox" id="check-all">
                        </th>
                        <th class="th-index">序号</th>
                        <th class="th-name">名称</th>
                        <th class="th-tags">标签</th>
                        <th class="th-desc">描述</th>
                        <th class="th-action">操作</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <!-- ==================== 批量操作栏 ==================== -->
        <!-- 选中内容项后显示，提供批量删除功能 -->
        <div class="batch-bar" id="batch-bar">
            <button class="btn btn-danger" id="batch-delete-btn">
                <i class="fas fa-trash"></i>
                批量删除
            </button>
        </div>
    </div>

    <!-- ==================== 弹窗容器 ==================== -->

    <!-- 隐藏的文件上传输入框，用于模板导入 -->
    <input type="file" id="template-file-input" accept=".xlsx,.xls" style="display:none;">

    <script src="js/abilityEditTemplates.js"></script>
    <script src="js/abilityEdit.js"></script>
    <script src="js/targetManagement.js"></script>
</body>

</html>
